services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_USE_MOCK_BACKEND: ${VITE_USE_MOCK_BACKEND:-false}
    image: itmo-web-frontend:local
    environment:
      # Runtime (no rebuild). Empty = same-origin (`/api/...`).
      VITE_API_BASE_URL: ${VITE_API_BASE_URL-}
    ports:
      - "${WEB_PORT:-5173}:80"
    restart: unless-stopped
